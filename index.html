<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeAuth | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 border border-slate-100">
        <div class="text-center mb-10">
            <h1 id="form-title" class="text-3xl font-800 tracking-tight text-slate-900 mb-2">Create Account<span>.</span></h1>
            <p id="form-subtitle" class="text-slate-500 font-medium">Join our premium community today.</p>
        </div>

        <form id="auth-form" action="/signup" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-700 text-slate-700 mb-2 ml-1">Username</label>
                <input type="text" name="username" required placeholder="e.g. sachin_k"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all">
            </div>
            <div>
                <label class="block text-sm font-700 text-slate-700 mb-2 ml-1">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-800 hover:bg-indigo-600 transition-all shadow-xl">
                Get Started
            </button>
        </form>

        <div class="mt-8 text-center">
            <button onclick="toggleMode()" id="toggle-btn" class="text-sm font-700 text-indigo-600 hover:underline">
                Already have an account? Login
            </button>
        </div>
    </div>

    <script>
        let isSignup = true;
        function toggleMode() {
            const form = document.getElementById('auth-form');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const btn = document.getElementById('submit-btn');
            const toggle = document.getElementById('toggle-btn');

            if (isSignup) {
                form.action = '/login';
                title.innerHTML = 'Welcome Back<span>.</span>';
                subtitle.innerText = 'Please enter your details to sign in.';
                btn.innerText = 'Sign In';
                toggle.innerText = "Don't have an account? Sign Up";
            } else {
                form.action = '/signup';
                title.innerHTML = 'Create Account<span>.</span>';
                subtitle.innerText = 'Join our premium community today.';
                btn.innerText = 'Get Started';
                toggle.innerText = "Already have an account? Login";
            }
            isSignup = !isSignup;
        }
    </script>
</body>
</html>
